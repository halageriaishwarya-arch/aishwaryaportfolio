<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>What We Do</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f7fb;
}

.section-title{
    text-align:center;
    font-weight:bold;
    margin-bottom:40px;
}

.box{
    background:white;
    padding:30px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.box:hover{
    background:#0d6efd;
    color:white;
    transform:translateY(-8px);
}
</style>
</head>

<body>

<div class="container py-5">

    <h2 class="section-title">What We Do</h2>

    <!-- Top Row (3 boxes) -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="box">Web Development</div>
        </div>
        <div class="col-md-4">
            <div class="box">App Development</div>
        </div>
        <div class="col-md-4">
            <div class="box">UI/UX Design</div>
        </div>
    </div>

    <!-- Bottom Row (3 boxes) -->
    <div class="row">
        <div class="col-md-4">
            <div class="box">Database Management</div>
        </div>
        <div class="col-md-4">
            <div class="box">Digital Marketing</div>
        </div>
        <div class="col-md-4">
            <div class="box">Technical Support</div>
        </div>
    </div>

</div>

</body>
</html>
